<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced KIZ Calculator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<body>

<div class="calculator">

    <div class="display">
        <div id="expression"></div>
        <div id="result">0</div>
    </div>


    <!-- 🔥 BUTTONS -->
    <div class="buttons">

        <!-- 🔹 TOP ROW (BEST PLACE FOR GST + AC) -->
        <!-- Scientific Row 1 -->
<button class="operator">sin</button>
<button class="operator">cos</button>
<button class="operator">tan</button>
<button class="operator">log</button>
<button class="operator">√</button>
<button class="operator">^</button>

<!-- Scientific Row 2 -->
<button class="operator">π</button>
<button class="operator">e</button>
<button class="operator">(</button>
<button class="operator">)</button>
<button class="operator">%</button>
<button class="operator">AC</button>
        <button class="operator">AC</button>
        <button value="GST+5">GST+5%</button>
<button value="GST+12">GST+12%</button>
<button value="GST+18">GST+18%</button>
<button value="GST+28">GST+28%</button>

<button value="GST-5">GST-5%</button>
<button value="GST-12">GST-12%</button>
<button value="GST-18">GST-18%</button>
<button value="GST-28">GST-28%</button>
        <button class="operator">%</button>
        <button class="operator">÷</button>
        <button class="operator">×</button>
        <button class="operator">+</button>
        <button class="operator">-</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>



        <button>4</button>
        <button>5</button>
        <button>6</button>


        <button>7</button>
        <button>8</button>
        <button>9</button>


        <button>0</button>
        <button>.</button>
        <button class="operator">DEL</button>
        <button class="equal">=</button>

    </div>

</div>

</body>
</html>
