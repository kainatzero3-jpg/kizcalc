<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"
<title>Advance KIZ Calculator</title>

<style>
body {
    margin: 0;
    padding: 0;
    flex-direction: column;
    background: linear-gradient(to right, #5eead4, #c084fc);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
}
.main-wrapper {
    display: flex;
    flex-direction: column;
    justify-content: center; /* Centers horizontally */
    align-items: center; /* Centers vertically */
    min-height: 100vh; /* Ensures the container takes up the full screen height */
    margin: 0;
    background: linear-gradient(to bottom right, #a0f1ea, #ead6ee); /* Your background colors */
}
.app-title {
    color: white; /* Matches your dark theme */
    font-size: 2rem;
    margin-bottom: 20px; /* Space between title and calculator */
    font-family: sans-serif;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.calculator {
    width: 380px;
    background: #1e293b;
    border-radius: 20px;
    padding: 6px;
    height: auto;
    min-height: 100dvh
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.emi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
}
.display {
    color: white;
    text-align: right;
    padding: 15px 10px;
}

#expression {
    font-size: 14px;
    opacity: 0.7;
}

#result {
    font-size: 28px;
    font-weight: bold;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
    padding: 10px;
}

button {
    padding: 6px;
    width: 100%;
    font-size: 11px;
    border: none;
    border-radius: 10px;
    background: #334155;
    color: white;
    white-space: nowrap;
    cursor: pointer;
}

button:hover {
    background: #475569;
}

.operator { background: #0f172a; }
.equal { background: linear-gradient(to bottom, #22d3ee, #14b8a6); }

.profit { background: green; }
.loss { background: red; }

.section {
    margin-bottom: 10px;
    width: 100%
}

input[type="text"],input[type="number"] {
    box-sizing: border-box
    width: 100%;
    height: 22px;
    margin-bottom: 5px;
    border-radius: 8px;
    border: none;
    padding: 5px;
}
</style>

</head>

<body>

<div class="calculator">

<div class="display">
    <div id="expression"></div>
    <div id="result">0</div>
</div>

<!-- SCIENTIFIC -->

<div class="buttons">
<button class="operator">sin</button>
<button class="operator">cos</button>
<button class="operator">tan</button>
<button class="operator">log</button>
<button class="operator">√</button>
<button class="operator">^</button>
<button class="operator">π</button>
<button class="operator">e</button>
<button class="operator">(</button>
<button class="operator">)</button>
<button class="operator">%</button>
<button class="operator">AC</button>
</div>

<!-- GST -->

<div class="buttons">
<button>GST+5%</button>
<button>GST+12%</button>
<button>GST+18%</button>
<button>GST+28%</button>
<button>GST-5%</button>
<button>GST-12%</button>
<button>GST-18%</button>
<button>GST-28%</button>
</div>

<!-- EMI -->

<div class="section">
<input id="loanAmount" placeholder="Loan Amount">
<input id="interestRate" placeholder="Interest Rate (%)">
<input id="tenure" placeholder="Years">

</div>
<button onclick="calculateEMI()">EMI Calculate</button>
<!-- PROFIT LOSS -->

<div class="section">
<input id="cp" placeholder="Cost Price">
<input id="sp" placeholder="Selling Price">

<div class="buttons">
<button class="profit" onclick="showProfit()">Profit</button>
<button class="loss" onclick="showLoss()">Loss</button>
<button onclick="calculateDiscount()">Discount</button>
</div>


<!-- MAIN CALCULATOR -->

<div class="buttons">
<button>7</button><button>8</button><button>9</button><button class="operator">÷</button>
<button>4</button><button>5</button><button>6</button><button class="operator">×</button>
<button>1</button><button>2</button><button>3</button><button class="operator">-</button>
<button>0</button><button>.</button><button class="operator">DEL</button><button class="operator">+</button>
<button class="equal">=</button>
</div>

</div>

<script>
let expression = "";

const expDisplay = document.getElementById("expression");
const resultDisplay = document.getElementById("result");

function updateDisplay() {
    expDisplay.innerText = expression;
}

document.querySelectorAll("button").forEach(button => {
    button.addEventListener("click", () => {
        let value = button.innerText;

        if (value === "=") {
            try {
                let exp = expression.replace(/÷/g, "/").replace(/×/g, "*");
                expression = eval(exp).toString();
                resultDisplay.innerText = expression;
                expDisplay.innerText = "";
            } catch {
                resultDisplay.innerText = "Error";
            }
        }

        else if (value === "DEL") {
            expression = expression.slice(0, -1);
            updateDisplay();
        }

        else if (value === "sin") expression += "Math.sin(";
        else if (value === "cos") expression += "Math.cos(";
        else if (value === "tan") expression += "Math.tan(";
        else if (value === "log") expression += "Math.log10(";
        else if (value === "√") expression += "Math.sqrt(";
        else if (value === "^") expression += "**";
        else if (value === "π") expression += Math.PI;
        else if (value === "e") expression += Math.E;

        else if (value === "AC") {
            expression = "";
            expDisplay.innerText = "";
            resultDisplay.innerText = "0";
        }

        else if (value.includes("GST")) {
            if (expression !== "") {
                let amount = eval(expression);
                let gst = parseFloat(value.replace("GST+", "").replace("GST-", ""));
                let result = value.includes("+")
                    ? amount + (amount * gst / 100)
                    : amount / (1 + gst / 100);

                resultDisplay.innerText = "₹ " + result.toFixed(2);
                expression = result.toString();
            }
        }

        else {
            expression += value;
            updateDisplay();
        }
    });
});

function calculateEMI() {
    let P = parseFloat(document.getElementById("loanAmount").value);
    let r = parseFloat(document.getElementById("interestRate").value) / 12 / 100;
    let n = parseFloat(document.getElementById("tenure").value) * 12;

    let emi = (P * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
    resultDisplay.innerText = "EMI ₹ " + emi.toFixed(2);
}

function showProfit() {
    let cp = parseFloat(document.getElementById("cp").value);
    let sp = parseFloat(document.getElementById("sp").value);
    if (isNaN(cp) || isNaN(sp)) {
        resultDisplay.innerText = "Enter CP & SP";
        return;
    }
    resultDisplay.innerText = "Profit: " + (sp - cp);
}

function showLoss() {
    let cp = parseFloat(document.getElementById("cp").value);
    let sp = parseFloat(document.getElementById("sp").value);
    if (isNaN(cp) || isNaN(sp)) {
        resultDisplay.innerText = "Enter CP & SP";
        return;
    }
    resultDisplay.innerText = "Loss: " + (cp - sp);
}

function calculateDiscount() {
    let price = parseFloat(prompt("Enter Original Price:"));
    let discount = parseFloat(prompt("Enter Discount %:"));

    if (isNaN(price) || isNaN(discount)) {
        alert("Invalid input");
        return;
    }

    let finalPrice = price - (price * discount / 100);
    alert("Final Price: " + finalPrice.toFixed(2));
}

</script>

</body>
</html>
